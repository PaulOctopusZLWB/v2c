<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="light dark" />
    <meta name="theme-color" content="#08090d" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <title>知迹 · 个人记忆</title>
    <!-- Pre-paint theme: set data-theme BEFORE the app bundle so there's no flash
         of the wrong theme (FOUC). Saved choice wins; otherwise default dark. -->
    <script>
      (function () {
        try {
          var saved = localStorage.getItem("pcn-theme"); // 'light' | 'dark' | null
          document.documentElement.dataset.theme = saved === "light" || saved === "dark" ? saved : "dark";
        } catch (e) {
          document.documentElement.dataset.theme = "dark";
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <!-- Overlay root: a sibling of #root, OUTSIDE the app shell's overflow:hidden. All floating UI
         (dropdowns, menus, tooltips, command palette, toasts, dialogs) portals here so it is never
         clipped by a scroll/transform ancestor and stacks purely via the z-index token scale. -->
    <div id="overlay-root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
