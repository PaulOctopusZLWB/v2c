[paths]
data_dir = "/data"
obsidian_vault = "/obsidian"
nas_archive_root = "/archive"

[vad]
backend = "funasr"
model_id = "fsmn-vad"
threshold = 0.03
min_speech_ms = 300
merge_gap_ms = 800
max_chunk_ms = 30000
chunk_overlap_ms = 1000

[asr]
backend = "funasr_server"
device = "mps"
language = "zh"
# ASR mode: "chunk" (default) = per-chunk SenseVoice; "diarize" = whole-file
# Paraformer + CAM++ diarization (per-sentence text + speaker + timestamps).
mode = "chunk"
model_name = "sensevoice"
model_id = "iic/SenseVoiceSmall"
model_version = "funasr-sensevoice-local"
# Diarize-mode knobs (only used when mode = "diarize"):
# diarize_model = "paraformer-zh"
# punc_model = "ct-punc"
# spk_model = "cam++"
# spk_mode = "punc_segment"
# preset_spk_num = 2  # omit to auto-detect speaker count

[llm]
backend = "rule_based"

[archive]
backend = "filesystem"
# command = "rsync -a {source_path} {archive_path}"

[device.dji_mic_3]
enabled = true
volume_root = "/Volumes"
volume_name_patterns = ["DJI*", "MIC*", "NO NAME"]
audio_globs = ["**/*.WAV", "**/*.wav"]
stable_seconds = 10

[obsidian]
edit_grace_seconds = 0
