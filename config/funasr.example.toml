[paths]
data_dir = "/data"
obsidian_vault = "/obsidian"
nas_archive_root = "/archive"

[vad]
backend = "funasr"
model_id = "fsmn-vad"
threshold = 0.03
min_speech_ms = 300
merge_gap_ms = 800
max_chunk_ms = 30000
chunk_overlap_ms = 1000

[asr]
backend = "funasr_server"
device = "mps"
language = "zh"
# ASR mode: "diarize" (standard) = whole-file Paraformer + internal FSMN-VAD + CAM++
# diarization (one task per file, per-sentence text + speaker + timestamps).
# "chunk" is DEPRECATED: it pre-splits audio with an energy VAD into thousands of
# sub-second segments (one ASR task each) and carries no speaker labels — do not use it.
mode = "diarize"
# Diarize-mode models:
diarize_model = "paraformer-zh"
punc_model = "ct-punc"
spk_model = "cam++"
spk_mode = "punc_segment"
# preset_spk_num = 2  # omit to auto-detect speaker count

[llm]
backend = "rule_based"

[archive]
backend = "filesystem"
# command = "rsync -a {source_path} {archive_path}"

[device.dji_mic_3]
enabled = true
volume_root = "/Volumes"
volume_name_patterns = ["DJI*", "MIC*", "NO NAME"]
audio_globs = ["**/*.WAV", "**/*.wav"]
stable_seconds = 10

[obsidian]
edit_grace_seconds = 0
