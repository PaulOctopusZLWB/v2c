[paths]
data_dir = "data"
obsidian_vault = "/Users/paul/Documents/Obsidian/PersonalContext"
nas_archive_root = "/Volumes/NAS/PersonalContext"

[vad]
backend = "mock"
threshold = 0.03
model_id = "fsmn-vad"
# model_revision = "v2.0.4"
max_chunk_ms = 30000

[asr]
backend = "mock"
# command = "python3 scripts/asr_wrapper_example.py"
language = "zh"
model_name = "sensevoice"
model_id = "iic/SenseVoiceSmall"
model_version = "funasr-sensevoice-local"

[llm]
backend = "mock"

[archive]
backend = "filesystem"
# command = "rsync -a {source_path} {archive_path}"

[device.dji_mic_3]
enabled = true
volume_root = "/Volumes"
# DJI Mic storage may mount as "NO NAME" on macOS.
volume_name_patterns = ["DJI*", "MIC*", "NO NAME"]
audio_globs = ["**/*.WAV", "**/*.wav"]
stable_seconds = 10
