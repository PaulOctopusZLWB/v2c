services:
  personal-context-node:
    build:
      context: .
      args:
        PCN_INSTALL_FUNASR: ${PCN_INSTALL_FUNASR:-false}
    command:
      - run-first-milestone
      - --source-dir
      - /input
      - --data-dir
      - /data
      - --obsidian-vault
      - /obsidian
      - --confirm-first-candidate
    volumes:
      - ./sample_data:/input:ro
      - ./data:/data
      - /Users/paul/Documents/Obsidian/PersonalContext:/obsidian
